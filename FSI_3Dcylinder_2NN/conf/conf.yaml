defaults :
  - physicsnemo_default
  - arch:
      - fully_connected
  - scheduler: tf_exponential_lr
  - optimizer: adam
  - loss: sum
  - _self_

scheduler:
  decay_rate: 0.97
  decay_steps: 20000

# 关闭 TorchScript JIT
#jit: false

training:
  rec_results_freq : 10000
  rec_constraint_freq: 10000
  max_steps : 2500000
  #cuda_graphs: false    # <<< 新加：关闭 CUDA graphs

batch_size:
  inlet: 2000
  outlet: 2000
  initial: 3000
  wall: 3000
  interior: 5000
  num_integral_continuity: 5
  integral_continuity: 8000
